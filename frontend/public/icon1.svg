<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <!-- Soft glow effect for modern AI aesthetic -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Gradient for the "C" ring -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7CFF" />
      <stop offset="100%" stop-color="#7C82B8" />
    </linearGradient>
  </defs>

  <!-- Outer "C" Ring (Craft / AI) with glowing gradient -->
  <path 
    d="M 185 85 A 75 75 0 1 0 185 171" 
    fill="none" 
    stroke="url(#ringGrad)" 
    stroke-width="20" 
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Inner bold "T" (Task) - Centered and slightly scaled down for perfect balance -->
  <g stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Horizontal bar of T (Centered at X:128) -->
    <line x1="102" y1="110" x2="154" y2="110" />
    <!-- Vertical stem of T (Centered at X:128) -->
    <line x1="128" y1="110" x2="128" y2="156" />
  </g>
</svg>
