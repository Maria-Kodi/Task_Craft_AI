<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img">
<title>TaskCraft AI icon</title>
<desc>A rounded dark navy square with a bright white border, containing a periwinkle ring open at the upper right, wrapping around a bold off-white letter T.</desc>
<defs>
  <clipPath id="sq">
    <rect x="40" y="40" width="600" height="600" rx="110"/>
  </clipPath>
  <!-- Premium radial gradient for the background to add depth -->
  <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
    <stop offset="0%" stop-color="#0E163B"/>
    <stop offset="100%" stop-color="#050816"/>
  </radialGradient>
  <!-- Glow effect for the white elements -->
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="12" result="blur" />
    <feComposite in="SourceGraphic" in2="blur" operator="over" />
  </filter>
</defs>

<!-- Background with Gradient and softer rounded corners (rx=110 for premium iOS-like squircle) -->
<rect x="40" y="40" width="600" height="600" rx="110" fill="url(#bgGrad)"/>

<!-- Background Grid -->
<g clip-path="url(#sq)" opacity="0.1" stroke="#7C82B8" stroke-width="1.5">
  <line x1="40" y1="140" x2="640" y2="140"/>
  <line x1="40" y1="240" x2="640" y2="240"/>
  <line x1="40" y1="340" x2="640" y2="340"/>
  <line x1="40" y1="440" x2="640" y2="440"/>
  <line x1="40" y1="540" x2="640" y2="540"/>
  <line x1="140" y1="40" x2="140" y2="640"/>
  <line x1="240" y1="40" x2="240" y2="640"/>
  <line x1="340" y1="40" x2="340" y2="640"/>
  <line x1="440" y1="40" x2="440" y2="640"/>
  <line x1="540" y1="40" x2="540" y2="640"/>
</g>

<!-- Central Periwinkle Ring (Letter C) -->
<circle cx="340" cy="340" r="170" fill="none" stroke="#7C82B8" stroke-width="32" stroke-dasharray="938 130" transform="rotate(-45 340 340)"/>

<!-- Pure White Letter T with a subtle premium glow -->
<g filter="url(#glow)">
  <rect x="240" y="230" width="200" height="46" fill="#FFFFFF" rx="4"/>
  <rect x="317" y="276" width="46" height="174" fill="#FFFFFF" rx="4"/>
</g>

<!-- Strong, visible premium white border (Shifted closer to edges with stroke-width 12) -->
<rect x="46" y="46" width="588" height="588" rx="104" fill="none" stroke="#FFFFFF" stroke-opacity="1" stroke-width="12"/>
</svg>
