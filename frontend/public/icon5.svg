<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <!-- Soft premium glow for the AI/SaaS look -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer "C" Ring: Long wrapping arc, almost a full circle with rounded ends -->
  <path 
    d="M 172 88 A 64 64 0 1 0 185 145" 
    fill="none" 
    stroke="#7C82B8" 
    stroke-width="13" 
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Inner Letter "T": Compact and perfectly centered inside the C-ring -->
  <g stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Horizontal bar of T -->
    <line x1="102" y1="105" x2="154" y2="105" />
    <!-- Vertical stem of T -->
    <line x1="128" y1="105" x2="128" y2="151" />
  </g>
</svg>
